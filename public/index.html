<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PR Reviewer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <a href="#" id="logo-link" class="logo">
        <svg width="20" height="20" viewBox="0 0 16 16" fill="currentColor"><path d="M1.5 3.25a2.25 2.25 0 1 1 3 2.122v5.256a2.251 2.251 0 1 1-1.5 0V5.372A2.25 2.25 0 0 1 1.5 3.25Zm5.677-.177L9.573.677A.25.25 0 0 1 10 .854V2.5h1A2.5 2.5 0 0 1 13.5 5v5.628a2.251 2.251 0 1 1-1.5 0V5a1 1 0 0 0-1-1h-1v1.646a.25.25 0 0 1-.427.177L7.177 3.427a.25.25 0 0 1 0-.354ZM3.75 2.5a.75.75 0 1 0 0 1.5.75.75 0 0 0 0-1.5Zm0 9.5a.75.75 0 1 0 0 1.5.75.75 0 0 0 0-1.5Zm8.25.75a.75.75 0 1 0 1.5 0 .75.75 0 0 0-1.5 0Z"></path></svg>
        PR Reviewer
      </a>
      <form id="pr-form">
        <input id="pr-input" type="text"
          placeholder="Paste PR URL or type owner/repo#123"
          autocomplete="off" />
        <button type="submit">Go</button>
      </form>
      <button id="clear-data-btn" type="button" title="Clear data stored in this browser">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M11 1.75V3h2.25a.75.75 0 0 1 0 1.5H2.75a.75.75 0 0 1 0-1.5H5V1.75C5 .784 5.784 0 6.75 0h2.5C10.216 0 11 .784 11 1.75ZM4.496 6.675l.66 6.6a.25.25 0 0 0 .249.225h5.19a.25.25 0 0 0 .249-.225l.66-6.6a.75.75 0 0 1 1.492.149l-.66 6.6A1.748 1.748 0 0 1 10.595 15h-5.19a1.75 1.75 0 0 1-1.741-1.575l-.66-6.6a.75.75 0 1 1 1.492-.15ZM6.5 1.75V3h3V1.75a.25.25 0 0 0-.25-.25h-2.5a.25.25 0 0 0-.25.25Z"></path></svg>
        <span>Clear data</span>
      </button>
      <button id="theme-toggle" type="button" title="Toggle theme" aria-label="Toggle theme">
        <svg class="theme-icon-light" width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 12a4 4 0 1 1 0-8 4 4 0 0 1 0 8ZM8 0a.75.75 0 0 1 .75.75v1.5a.75.75 0 0 1-1.5 0V.75A.75.75 0 0 1 8 0Zm0 13a.75.75 0 0 1 .75.75v1.5a.75.75 0 0 1-1.5 0v-1.5A.75.75 0 0 1 8 13ZM2.343 2.343a.75.75 0 0 1 1.06 0l1.061 1.061a.75.75 0 0 1-1.06 1.06L2.343 3.404a.75.75 0 0 1 0-1.06Zm9.193 9.193a.75.75 0 0 1 1.06 0l1.061 1.06a.75.75 0 0 1-1.06 1.061l-1.061-1.06a.75.75 0 0 1 0-1.061ZM16 8a.75.75 0 0 1-.75.75h-1.5a.75.75 0 0 1 0-1.5h1.5A.75.75 0 0 1 16 8ZM3 8a.75.75 0 0 1-.75.75H.75a.75.75 0 0 1 0-1.5h1.5A.75.75 0 0 1 3 8Zm10.657-5.657a.75.75 0 0 1 0 1.06l-1.061 1.061a.75.75 0 1 1-1.06-1.06l1.06-1.061a.75.75 0 0 1 1.06 0Zm-9.193 9.193a.75.75 0 0 1 0 1.06l-1.06 1.061a.75.75 0 1 1-1.061-1.06l1.06-1.061a.75.75 0 0 1 1.061 0Z"/></svg>
        <svg class="theme-icon-dark" width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M9.598 1.591a.749.749 0 0 1 .785-.175 7.001 7.001 0 1 1-8.967 8.967.75.75 0 0 1 .961-.96 5.5 5.5 0 0 0 7.046-7.046.75.75 0 0 1 .175-.786Zm1.616 1.945a7 7 0 0 1-7.678 7.678 5.499 5.499 0 1 0 7.678-7.678Z"/></svg>
      </button>
    </div>
  </header>

  <!-- Clear data modal -->
  <div id="clear-data-modal" class="modal" hidden>
    <div class="modal-backdrop" data-close></div>
    <div class="modal-content" role="dialog" aria-labelledby="clear-data-title">
      <div class="modal-header">
        <h2 id="clear-data-title">Clear stored data</h2>
        <button class="modal-close" type="button" data-close aria-label="Close">&times;</button>
      </div>
      <p class="modal-subtitle">
        All data is stored locally in your browser. Choose which categories to clear.
      </p>
      <div id="clear-data-options"></div>
      <div class="modal-actions">
        <button class="btn-secondary" type="button" data-close>Cancel</button>
        <button class="btn-danger" type="button" id="clear-data-confirm">Clear selected</button>
      </div>
    </div>
  </div>

  <main id="app">
    <!-- Index panel (default) -->
    <section id="index-panel">
      <div class="index-hero">
        <h2>Review pull requests, faster.</h2>
        <p class="index-subtitle">Enter a repository to browse its pull requests, or paste a PR URL above.</p>
      </div>

      <div class="index-search">
        <form id="repo-form">
          <div class="search-input-wrap">
            <svg class="search-icon" width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M10.68 11.74a6 6 0 0 1-7.922-8.982 6 6 0 0 1 8.982 7.922l3.04 3.04a.749.749 0 0 1-.326 1.275.749.749 0 0 1-.734-.215ZM11.5 7a4.499 4.499 0 1 0-8.997 0A4.499 4.499 0 0 0 11.5 7Z"></path></svg>
            <input id="repo-input" type="text"
              placeholder="Search repositories... (e.g. facebook/react)"
              autocomplete="off" />
          </div>
          <button type="submit">List PRs</button>
        </form>
      </div>

      <div id="recent-repos"></div>

      <div id="current-repo-header" hidden></div>

      <div id="pr-list-controls" hidden>
        <div class="filter-row">
          <div class="filter-bar">
            <button class="filter-btn active" data-state="open">Open</button>
            <button class="filter-btn" data-state="closed">Closed</button>
            <button class="filter-btn" data-state="all">All</button>
          </div>
          <div class="filter-user-inputs">
            <label class="filter-user-input">
              <span>Author</span>
              <input id="filter-author" type="text" list="user-suggestions"
                placeholder="anyone" autocomplete="off" />
            </label>
            <label class="filter-user-input">
              <span>Reviewer</span>
              <input id="filter-reviewer" type="text" list="user-suggestions"
                placeholder="anyone" autocomplete="off" />
            </label>
            <datalist id="user-suggestions"></datalist>
          </div>
          <span id="pr-list-summary" class="muted"></span>
        </div>
      </div>
      <div id="pr-list"></div>
    </section>

    <!-- PR panel (shown when a PR is loaded) -->
    <section id="pr-panel" hidden>
      <div id="pr-header"></div>

      <nav id="tab-nav" role="tablist">
        <button role="tab" aria-selected="true" data-tab="conversation">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M1.75 1h8.5c.966 0 1.75.784 1.75 1.75v5.5A1.75 1.75 0 0 1 10.25 10H7.061l-2.574 2.573A1.458 1.458 0 0 1 2 11.543V10h-.25A1.75 1.75 0 0 1 0 8.25v-5.5C0 1.784.784 1 1.75 1ZM1.5 2.75v5.5c0 .138.112.25.25.25h1a.75.75 0 0 1 .75.75v2.19l2.72-2.72a.749.749 0 0 1 .53-.22h3.5a.25.25 0 0 0 .25-.25v-5.5a.25.25 0 0 0-.25-.25h-8.5a.25.25 0 0 0-.25.25Zm13 2a.25.25 0 0 0-.25-.25h-.5a.75.75 0 0 1 0-1.5h.5c.966 0 1.75.784 1.75 1.75v5.5A1.75 1.75 0 0 1 14.25 12H14v1.543a1.458 1.458 0 0 1-2.487 1.03L9.22 12.28a.749.749 0 0 1 .326-1.275.749.749 0 0 1 .734.215l2.22 2.22v-2.19a.75.75 0 0 1 .75-.75h1a.25.25 0 0 0 .25-.25Z"></path></svg>
          Conversation <span class="counter" id="conv-count">0</span>
        </button>
        <button role="tab" aria-selected="false" data-tab="ai-comments">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <!-- antenna -->
            <line x1="8" y1="1.5" x2="8" y2="3"></line>
            <circle cx="8" cy="1.25" r="0.6" fill="currentColor" stroke="none"></circle>
            <!-- head -->
            <rect x="2.5" y="3.5" width="11" height="9" rx="2"></rect>
            <!-- eyes -->
            <circle cx="6" cy="8" r="1" fill="currentColor" stroke="none"></circle>
            <circle cx="10" cy="8" r="1" fill="currentColor" stroke="none"></circle>
            <!-- mouth -->
            <line x1="6" y1="10.75" x2="10" y2="10.75"></line>
            <!-- side vents -->
            <line x1="1" y1="6.5" x2="1" y2="9.5"></line>
            <line x1="15" y1="6.5" x2="15" y2="9.5"></line>
          </svg>
          AI Comments <span class="counter" id="ai-count">0</span>
        </button>
        <button role="tab" aria-selected="false" data-tab="files-changed">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M2 1.75C2 .784 2.784 0 3.75 0h6.586c.464 0 .909.184 1.237.513l2.914 2.914c.329.328.513.773.513 1.237v9.586A1.75 1.75 0 0 1 13.25 16h-9.5A1.75 1.75 0 0 1 2 14.25Zm1.75-.25a.25.25 0 0 0-.25.25v12.5c0 .138.112.25.25.25h9.5a.25.25 0 0 0 .25-.25V6h-2.75A1.75 1.75 0 0 1 9 4.25V1.5Zm6.75.062V4.25c0 .138.112.25.25.25h2.688l-.011-.013-2.914-2.914-.013-.011Z"></path></svg>
          Files Changed <span class="counter" id="files-count">0</span>
        </button>
        <button role="tab" aria-selected="false" data-tab="actions">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M1.5 2.75A.75.75 0 0 1 2.25 2h11.5a.75.75 0 0 1 0 1.5H2.25a.75.75 0 0 1-.75-.75Zm0 5A.75.75 0 0 1 2.25 7h6.5a.75.75 0 0 1 0 1.5h-6.5A.75.75 0 0 1 1.5 7.75Zm0 5a.75.75 0 0 1 .75-.75h11.5a.75.75 0 0 1 0 1.5H2.25a.75.75 0 0 1-.75-.75Zm9.28-1.72 2.5-2.5a.75.75 0 0 0 0-1.06l-2.5-2.5a.75.75 0 0 0-1.06 1.06L11.44 8l-1.72 1.72a.75.75 0 1 0 1.06 1.06Z"></path></svg>
          Actions <span class="counter" id="actions-count">0</span>
        </button>
      </nav>

      <div id="tab-panels">
        <div id="panel-conversation" role="tabpanel"></div>
        <div id="panel-ai-comments" role="tabpanel" hidden></div>
        <div id="panel-files-changed" role="tabpanel" hidden></div>
        <div id="panel-actions" role="tabpanel" hidden></div>
      </div>
    </section>
  </main>

  <div id="loading" hidden>
    <div class="spinner"></div>
    <p>Loading...</p>
  </div>

  <div id="error" hidden></div>

  <script type="module" src="app.js"></script>
</body>
</html>
